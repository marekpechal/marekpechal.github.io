routes:
  - heading_en: To the German border
    heading_cz: K německé hranici
    length: 65.7
    places:
    - name: Zurich
    - name: Otelfingen
    - name: Kaiserstuhl
    - name: Rheinau
    description_en: Starting off via Höngg to the Furttal, then crossing Lägern and Wehntal to enter Eggwald and reach the Rhine and the German border at Kaiserstuhl. Afterwards, following the Rhine upstream, cutting across the bend at Buchberg, crossing back to the left bank and continuing there to Rheinau.
    description_cz: Vyrážím přes Höngg do údolí Furttal, pak přes horský hřeben Lägern a údolí Wehntal do lesa Eggwald. Dostávám se k Rýnu a německé hranici v Kaiserstuhlu. Pak pokračuji proti proudu Rýna, zkracuji si to přes záhyb řeky u Buchbergu, přecházím zpět na levý břeh a tam pokračuji do Rheinau.
    map_filename: map_route_D
  - heading_en: To the Italian border
    heading_cz: K italské hranici
    length: 175.6
    places:
    - name: Zurich
    - name: Egg
    - name: Pfaffikon
    - name: Biberbrugg
    - name: Sattel
    - name: Brunnen
    - name: Altdorf
    - name: Wassen
    - name: Realp
    - name: Oberwald
    description_en: In the direction of Greifensee, via Egg and Hombrechtikon to the southern tip of lake Zurich at Rapperswil. Then crossing the dam between it and Obersee to Pfäffikon and continuing up to the Etzel summit and to Biberbrugg. Continuing past the raised bog Rothenturm to Sattel, then downhill to Seewen and passing Schwyz towards Brunnen. Afterwards along the eastern shore of Urnersee to Altdorf and upstream along the Reuss to Wassen, Göschenen and Andermatt. Then westwards along the valley to Realp and over the Furka pass to Oberwald in the Rhone valley.
    description_cz: Směrem ke Greifensee, přes Egg a Hombrechtikon k jižnímu cípu Curyšského jezera v Rapperswilu. Pak přes hráz mezi ním a jezerem Obersee do Pfäffikonu a pokračuji na vrchol Etzelu a do Biberbruggu. Kolem vrchoviště Rothenturm do Sattelu, pak z kopce dolů do Seewenu a kolem Schwyzu do Brunnenu. Pak po východním břehu jezera Urnersee do Altdorfu a proti proudu řeky Reuss do Wassenu, Göschenenu a Andermattu. Potom na západ údolím do Realpu a přes průsmyk Furka do Oberwaldu v údolí Rhôny.
    map_filename: map_route_I
  - heading_en: To the Emme valley (Emmental)
    heading_cz: Do údolí řeky Emme (Emmental)
    length: 87.0
    places:
    - name: Zurich
    - name: Birmensdorf
    - name: Affoltern am Albis
    - name: Cham
    - name: Ebikon
    - name: Wolhusen
    description_en: Around Uetliberg from the north via Birmensdorf, then southward via Bonstetten to Affoltern am Albis and further towards the Lorze and following it to Cham at lake Zug. Hugging the lake for a bit, then turning south-west to Meierskappel and following the ridge before descending to Ebikon in the Reuss valley. Passing through the urban area around Emmen to continue upstream along the Kleine Emme to Werthenstein and Wolhusen.
    description_cz: Kolem Uetlibergu ze severu přes Birmensdorf, pak na jih přes Bonstetten do Affolternu am Albis a dál k řece Lorze a podél ní do města Cham u Zugského jezera. Nejdříve chvíli jdu podél břehu jezera, pak se obracím na jihozápad do vesnice Meierskappel a po hřebeni, než pak sejdu do Ebikonu v údolí řeky Reuss. Procházím zastavěným územím kolem města Emmen a pokračuji proti proudu řeky Kleine Emme do Werthensteinu a Wolhusenu.
    map_filename: map_route_Emme
  - heading_en: To the French border
    heading_cz: K francouzské hranici
    length: 185.5
    places:
    - name: Zurich
    - name: Reppischhof
    - name: Wohlen
    - name: Aarau
    - name: Gelterkinden
    - name: Gempen
    - name: Flüh
    - name: Laufen
    - name: Delemont
    - name: Court
    description_en: Crossing the Limmat valley to Schlieren, Rudolfstetten and Bremgarten, then over the forested hills west of the town to Wohlen, around the hill Eichberg to Seon, then over another ridge to Suhr and Aarau. Crossing the Aare and up to Schafmatt pass, then down the northern slopes to Rothenfluh and following the valley to Gelterkinden. A detour via the hills to the north to Lausen and Liestal, then leaving the valley up to Nuglar and Gempen. Then down again to the Birs valley and to the French border at Flüh. Turning south-west to Metzerlen and then south over the Challpass to Laufen. Crossing the Birs once again, up to Karlisberg and then following the ridge westward before descending to Delemont. From here I cross the next ridge in the south to Moutier and then through along the Rue des Gorges to the town of Court.
    description_cz: Přecházím údolí Limmatu do Schlierenu, Rudolfstettenu a Bremgartenu, pak přes zalesněné kopce na západ od města do Wohlenu, kolem kopce Eichbergu do Seonu, pak přes další hřeben do Suhru a Aarau. Přecházím Aare a jdu nahoru do průsmyku Schafmatt, pak dolů po severních svazích do Rothenfluhu a údolím do Gelterkindenu. Zacházkou přes kopce na sever do Lausenu a Liestalu, pak opouštím údolí a jdu nahoru do vesnic Nuglar a Gempen. Poté opět dolů do údolí řeky Birs a k francouzským hranicím ve vsi Flüh. Stáčím se na severozápad do Metzerlenu a pak na jih přes průsmyk Challpass do Laufenu. Tam znovu přecházím přes Birs, nahoru na Karlisberg a po hřebeni na západ než sestoupím do Delemontu. Odtud pak přecházím přes další hřeben na jih do Moutier a pak soutěskou podél Rue des Gorges do obce Court.
    map_filename: map_route_F
  - heading_en: To Liechtenstein and the Austrian border
    heading_cz: Do Lichtenštejnska a k rakouské hranici
    length: 219.5
    places:
    - name: Rapperswil
    - name: Wattwil
    - name: Urnäsch
    - name: Appenzell
    - name: Rüthi
    - name: Sevelen
    - name: Maienfeld
    - name: Chur
    - name: Langwies
    - name: Arosa
    - name: Filisur
    description_en: Starting from Rapperswil following Via Jacobi to St. Gallenkappel and along the slopes of Tweralpspitz to Wattwil, then up the opposite side of the Thur valley to Sankt Peterzell. Then leaving Via Jacobi at Chäseren, crossing the Tüfenbach valley and following Appenzeller Weg over the hills to Urnäsch. Up to Spitzli and along the ridge to Kronberg and Scheidegg, then down to Appenzell. From here over the hill and down to the Rhine valley at Rüthi. Then following the Rhine upstream to the outskirts of Vaduz, Sevelen, Balzers and through the valley between Guschaspitz and Gir to Maienfeld. Through Malanz, Zizers and following the Rhine to Chur. Then along the southern slopes of the Plessur valley via Passugg and Tschiertschen to Langwies. Afterwards up to Arosa and further towards Valbella Furgga but turning back at Alteinsee due to snow and ending up in Arosa. Next time I set off up the Welschtobel valley over the Furcletta pass into the valley of the Albula river.
    description_cz: Vyrážím z Rapperswilu po stezce Via Jacobi do St. Gallenkappel a po úbočí hory Tweralpspitz do Wattwilu, pak nahoru opačným svahem údolí řeky Thur do Sankt Peterzellu. V Chäseren opouštím Via Jacobi a přecházím údolí Tüfenbachu a po stezce Apenzeller Weg jdu přes kopce do vesnice Urnäsch. Na horu Spitzli a po hřebeni na Kronberg, Scheidegg a pak dolů do Appenzellu. Odtud přes kopec a dolů do údolí Rýna u vesnice Rüthi. Pak jdu proti směru Rýna, přes předměstí Vaduzu, přes Sevelen a Balzers a údolím mezi vrcholy Guschaspitz a Gir do Maienfeldu. Přes města Malanz, Zizers a podél Rýna do Churu. Pak jdu po jižních svazích údolí řeky Plessur přes Passugg a Tschiertschen do Langwiesu. Dále nahoru do Arosy a k průsmyku Valbella Furgga, ale u jezera Alteinsee se musím otočit kvůli sněhu a končím zpátky v Arose. Příště pak vyrážím údolím Welschtobel přes průsmyk Furcletta do údolí řeky Albula.
    map_filename: map_route_FL_A
  - heading_en: To Sarnersee
    heading_cz: K jezeru Sarnersee
    length: 121.1
    places:
    - name: Zurich
    - name: Adliswil
    - name: Sihlwald
    - name: Baar
    - name: Walchwil
    - name: Goldau
    - name: Luzern
    - name: Sarnen
    description_en: Leaving Zurich along the Sihl valley, then crossing over Albishorn to Baar. From there following the Lorze upstream and crossing over the hills from Neuägeri back towards lake Zug. Walking around the southern end of the lake with a detour over the Gnipen summit and Goldau. Following the slopes of Rigi to Seebodenalp and then down to lake Luzern at Küssnacht. From there, along the ridge above the lake to the city of Luzern. Southwards between Pilatus and the lake, over Ränggpass to the Sarneraa valley.
    description_cz: Vyrážím z Curychu údolím Sihlu, pak přes Albishorn do Baaru. Odtud pak proti proudu řeky Lorze přes kopce z Neuägeri zpátky k Zugskému jezeru. Obcházím jižní cíp jezera se zacházkou přes vrchol Gnipen a město Goldau. Po úbočí Rigi na Seebodenalp a pak dolů k Lucernskému jezeru v Küssnachtu. Odtud pak podél horského hřbetu nad jezerem do Lucernu. Na jih mezi horou Pilatus a jezerem, přes Ränggpass do údolí řeky Sarneraa.
    map_filename: map_route_Sarnersee

